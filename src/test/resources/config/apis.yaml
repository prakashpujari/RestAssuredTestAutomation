# API Test Definitions - Add 100+ APIs here
apis:
  # Real Public APIs for E2E Testing
  # =================================

  # JSONPlaceholder API - Free fake API for testing
  # https://jsonplaceholder.typicode.com
  - name: jsonplaceholder-posts
    basePath: /
    baseUrl: https://jsonplaceholder.typicode.com
    endpoints:
      - method: GET
        path: /posts
        description: List all posts
        tests:
          - name: list-posts-success
            type: positive
            expectedStatus: 200
          - name: list-posts-with-params
            type: positive
            expectedStatus: 200
            queryParams:
              userId: "1"

      - method: GET
        path: /posts/{id}
        description: Get single post
        tests:
          - name: get-post-success
            type: positive
            expectedStatus: 200
            pathParams:
              id: "1"
          - name: get-post-not-found
            type: negative
            expectedStatus: 404
            pathParams:
              id: "999"

      - method: POST
        path: /posts
        description: Create new post
        tests:
          - name: create-post-success
            type: positive
            expectedStatus: 201

  # ReqRes API - User testing API
  # https://reqres.in
  - name: reqres-users
    basePath: /
    baseUrl: https://reqres.in/api
    endpoints:
      - method: GET
        path: /users
        description: List users with pagination
        tests:
          - name: list-users-success
            type: positive
            expectedStatus: 200
          - name: list-users-page-2
            type: positive
            expectedStatus: 200
            queryParams:
              page: "2"

      - method: GET
        path: /users/{id}
        description: Get single user
        tests:
          - name: get-user-success
            type: positive
            expectedStatus: 200
            pathParams:
              id: "1"
          - name: get-user-not-found
            type: negative
            expectedStatus: 404
            pathParams:
              id: "999"

      - method: POST
        path: /users
        description: Create user
        tests:
          - name: create-user-success
            type: positive
            expectedStatus: 201

      - method: PUT
        path: /users/{id}
        description: Update user
        tests:
          - name: update-user-success
            type: positive
            expectedStatus: 200
            pathParams:
              id: "1"

      - method: DELETE
        path: /users/{id}
        description: Delete user
        tests:
          - name: delete-user-success
            type: positive
            expectedStatus: 204
            pathParams:
              id: "1"

  # Public APIs Directory
  # https://api.publicapis.org
  - name: httpbin
    basePath: /
    baseUrl: https://httpbin.org
    endpoints:
      - method: GET
        path: /get
        description: Echo request
        tests:
          - name: echo-success
            type: positive
            expectedStatus: 200

      - method: GET
        path: /status/200
        description: Return status code
        tests:
          - name: status-200
            type: positive
            expectedStatus: 200

      - method: GET
        path: /status/404
        description: Return 404 status
        tests:
          - name: status-404
            type: negative
            expectedStatus: 404

      - method: POST
        path: /post
        description: Echo POST body
        tests:
          - name: post-echo
            type: positive
            expectedStatus: 200

  # Your internal APIs (existing)
  - name: customers
    basePath: /
    baseUrl: http://localhost:8089
    endpoints:
      - method: GET
        path: /customers/{id}
        description: Get customer by ID
        tests:
          - name: get-by-id-success
            type: positive
            expectedStatus: 200
            headers:
              client_id: ${env:CLIENT_ID}
              client_secret: ${env:CLIENT_SECRET}
            pathParams:
              id: "1"
          - name: get-by-id-not-found
            type: negative
            expectedStatus: 404
            pathParams:
              id: "999"

      - method: POST
        path: /customers
        description: Create customer
        tests:
          - name: create-success
            type: positive
            expectedStatus: 201
            bodyTemplate: customer-create.json
          - name: create-missing-email
            type: negative
            expectedStatus: 400
            bodyTemplate: customer-missing-email.json

      - method: PUT
        path: /customers/{id}
        description: Update customer
        tests:
          - name: update-success
            type: positive
            expectedStatus: 200
            pathParams:
              id: "1"

      - method: DELETE
        path: /customers/{id}
        description: Delete customer
        tests:
          - name: delete-success
            type: positive
            expectedStatus: 204
            pathParams:
              id: "1"

  - name: orders
    basePath: /orders
    baseUrl: http://localhost:8089
    endpoints:
      - method: GET
        path: /orders
        tests:
          - name: list-success
            type: positive
            expectedStatus: 200
      - method: POST
        path: /orders
        tests:
          - name: create-success
            type: positive
            expectedStatus: 201

  # Add more APIs here (products, payments, users, etc.)
  # Each API just needs: endpoints + basic test definitions

environments:
  local:
    baseUrl: http://localhost:8089
    client_id: test-client
    client_secret: test-secret

  dev:
    baseUrl: https://dev-api.company.com
    client_id: ${CLIENT_ID_DEV}
    client_secret: ${CLIENT_SECRET_DEV}

  qa:
    baseUrl: https://qa-api.company.com
    client_id: ${CLIENT_ID_QA}
    client_secret: ${CLIENT_SECRET_QA}

  prod:
    baseUrl: https://api.company.com
    client_id: ${CLIENT_ID_PROD}
    client_secret: ${CLIENT_SECRET_PROD}