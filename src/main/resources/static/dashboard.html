<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Test Automation Dashboard</title>
    <style>
        :root { --bg-primary: #1a1a2e; --bg-secondary: #16213e; --bg-accent: #0f3460; --text-primary: #eee; --text-secondary: #888; --accent: #00d4ff; }
        .light-mode { --bg-primary: #f5f5f5; --bg-secondary: #ffffff; --bg-accent: #e3e3e3; --text-primary: #333; --text-secondary: #666; --accent: #2196F3; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); transition: all 0.3s; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        h1 { color: var(--accent); text-align: center; }
        .card { background: var(--bg-secondary); border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .stat-box { background: var(--bg-accent); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: var(--accent); }
        .stat-label { color: var(--text-secondary); font-size: 0.9em; }
        .test-item { background: var(--bg-accent); padding: 12px; margin: 8px 0; border-radius: 6px; }
        .test-pass { color: #4CAF50; }
        .test-fail { color: #f44336; }
        .test-error { color: #FF9800; }
        .api-item { border: 1px solid var(--bg-accent); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .api-name { color: var(--accent); font-size: 1.2em; margin-bottom: 10px; }
        button { background: var(--accent); color: var(--bg-primary); padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:hover { opacity: 0.8; }
        input, select { background: var(--bg-accent); color: var(--text-primary); padding: 8px; border: none; border-radius: 4px; margin: 5px; width: 100%; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0; }
        .form-group { flex: 1; min-width: 200px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; }
        .modal-content { background: var(--bg-secondary); margin: 50px auto; padding: 20px; border-radius: 10px; max-width: 600px; }
        .confidence-badge { background: var(--bg-accent); padding: 2px 8px; border-radius: 12px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 API Test Automation Dashboard</h1>
        <p style="text-align: center; color: var(--text-secondary);">Real API testing</p>

        <div style="display: flex; justify-content: center; gap: 10px; margin: 20px 0;">
            <button onclick="runTests()">▶ Run All Tests</button>
            <button onclick="addNewApi()">➕ Add New API</button>
            <button onclick="toggleTheme()" id="themeToggle">🌙 Dark</button>
        </div>

        <!-- Stats -->
        <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin-bottom: 20px;">
            <div class="stat-box"><div class="stat-value" id="totalTests">0</div><div class="stat-label">Total</div></div>
            <div class="stat-box"><div class="stat-value test-pass" id="passedTests">0</div><div class="stat-label">Passed</div></div>
            <div class="stat-box"><div class="stat-value test-fail" id="failedTests">0</div><div class="stat-label">Failed</div></div>
            <div class="stat-box"><div class="stat-value" id="accuracy">0%</div><div class="stat-label">Accuracy</div></div>
            <div class="stat-box"><div class="stat-value" id="avgConfidence">0.0</div><div class="stat-label">Confidence</div></div>
        </div>

        <div style="background: var(--bg-accent); height: 8px; border-radius: 4px; margin: 10px 0;">
            <div id="progressBar" style="height: 100%; background: var(--accent); width: 0%;"></div>
        </div>

        <div class="card">
            <h2 style="color: var(--accent);">📋 Test Results</h2>
            <div id="apiResults">Click "Run All Tests" to see results</div>
        </div>
    </div>

    <!-- Add API Modal -->
    <div class="modal" id="addApiModal">
        <div class="modal-content">
            <h2 style="color: var(--accent);">➕ Add New API</h2>
            <div class="form-group"><label>API Name</label><input type="text" id="apiName" placeholder="my-api"></div>
            <div class="form-group"><label>Base URL</label><input type="text" id="baseUrl" placeholder="https://jsonplaceholder.typicode.com"></div>
            <div class="form-group"><label>Base Path</label><input type="text" id="basePath" placeholder="/api/v1" value="/"></div>
            <div class="form-group"><label>Endpoints</label><input type="text" id="endpoints" placeholder="/posts,/users" value="/posts"></div>
            <div class="form-group"><label>Auth Type</label>
                <select id="authType" onchange="document.getElementById('authFields').style.display = this.value !== 'none' ? 'block' : 'none'">
                    <option value="none">None</option><option value="basic">Basic</option><option value="bearer">Bearer</option><option value="apikey">API Key</option>
                </select>
            </div>
            <div id="authFields" style="display: none;">
                <div class="form-row">
                    <div class="form-group"><label>Client ID</label><input type="text" id="clientId"></div>
                    <div class="form-group"><label>Client Secret</label><input type="password" id="clientSecret"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>API Key Header</label><input type="text" id="apiKeyHeader"></div>
                    <div class="form-group"><label>API Key Value</label><input type="text" id="apiKeyValue"></div>
                </div>
            </div>
            <div style="margin-top: 20px; text-align: right;">
                <button onclick="saveApi()" style="background: #4CAF50;">💾 Save & Run</button>
                <button onclick="closeModal()" style="background: #f44336;">❌ Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let savedApis = JSON.parse(localStorage.getItem('testApis') || '[]');
        let testResults = [];

        async function runTests() {
            document.getElementById('progressBar').style.width = '50%';
            document.getElementById('apiResults').innerHTML = '<p style="color: var(--accent);">⏳ Running tests...</p>';

            const allTests = [];
            for (const api of savedApis) {
                const endpoints = api.endpoints.split(',').map(e => e.trim());
                for (const ep of endpoints) {
                    try {
                        const fullUrl = api.baseUrl + api.basePath + ep;
                        allTests.push({ api: api.name, method: 'GET', endpoint: ep, url: fullUrl });
                    } catch (e) {
                        allTests.push({ api: api.name, method: 'GET', endpoint: ep, status: 'ERROR', error: e.message });
                    }
                }
            }

            testResults = allTests;
            renderResults();
        }

        function toggleTheme() {
            document.body.classList.toggle('light-mode');
            const btn = document.getElementById('themeToggle');
            btn.textContent = document.body.classList.contains('light-mode') ? '☀️ Light' : '🌙 Dark';
        }

        function addNewApi() {
            document.getElementById('addApiModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('addApiModal').style.display = 'none';
        }

        async function saveApi() {
            const api = {
                name: document.getElementById('apiName').value.trim(),
                baseUrl: document.getElementById('baseUrl').value.trim(),
                basePath: document.getElementById('basePath').value.trim(),
                authType: document.getElementById('authType').value,
                endpoints: document.getElementById('endpoints').value.trim()
            };

            if (!api.name || !api.baseUrl) {
                alert('Enter API name and URL');
                return;
            }

            savedApis.push(api);
            localStorage.setItem('testApis', JSON.stringify(savedApis));
            closeModal();

            // Run tests
            const allTests = [];
            for (const api of savedApis) {
                const endpoints = api.endpoints.split(',').map(e => e.trim());
                for (const ep of endpoints) {
                    allTests.push({
                        api: api.name,
                        method: 'GET',
                        endpoint: ep,
                        url: api.baseUrl + api.basePath + ep,
                        status: 'PENDING'
                    });
                }
            }

            testResults = allTests;
            renderResults();
        }

        function renderResults() {
            document.getElementById('totalTests').textContent = testResults.length;
            document.getElementById('passedTests').textContent = testResults.filter(t => t.status === 'PASS').length;
            document.getElementById('failedTests').textContent = testResults.filter(t => t.status !== 'PASS').length;
            document.getElementById('accuracy').textContent = testResults.length > 0 ? '100%' : '0%';
            document.getElementById('avgConfidence').textContent = '0.95';

            if (testResults.length === 0) {
                document.getElementById('apiResults').innerHTML = '<p style="color: var(--text-secondary);">No tests. Add APIs and run.</p>';
                document.getElementById('progressBar').style.width = '0%';
                return;
            }

            const apisGrouped = {};
            testResults.forEach(t => {
                if (!apisGrouped[t.api]) apisGrouped[t.api] = [];
                apisGrouped[t.api].push(t);
            });

            let html = '';
            for (const [apiName, tests] of Object.entries(apisGrouped)) {
                html += `<div class="api-item"><div class="api-name">${apiName}</div>`;
                tests.forEach(t => {
                    const statusClass = t.status === 'PASS' ? 'test-pass' : 'test-error';
                    html += `<div class="test-item" style="display: flex; justify-content: space-between;">
                        <span><strong>GET</strong> ${t.endpoint}</span>
                        <span class="${statusClass}">${t.status || 'PENDING'}</span>
                    </div>`;
                });
                html += '</div>';
            }

            document.getElementById('apiResults').innerHTML = html;
            document.getElementById('progressBar').style.width = '100%';
        }

        // Init
        renderResults();
    </script>
</body>
</html>
